name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run check-types

      - name: Setup test database
        run: bun run db:push && bun run db:seed
        env:
          DATABASE_URL: file:./local.db
          BETTER_AUTH_SECRET: test-secret-that-is-at-least-32-chars-long
          BETTER_AUTH_URL: http://localhost:3000
          CORS_ORIGIN: http://localhost:3001
          NODE_ENV: test

      - name: Run tests
        run: bun run test
        env:
          BETTER_AUTH_SECRET: test-secret-that-is-at-least-32-chars-long
          BETTER_AUTH_URL: http://localhost:3000
          CORS_ORIGIN: http://localhost:3001
          NODE_ENV: test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build for production
        run: bun run build

      # Uncomment below for Vercel deployment
      # - name: Deploy to Vercel
      #   run: |
      #     bun add -g vercel
      #     vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
