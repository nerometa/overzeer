services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: overzeer-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    networks:
      - overzeer

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: overzeer-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
    depends_on:
      - backend
    networks:
      - overzeer

networks:
  overzeer:
    driver: bridge
